spring.application.name=CRW
server.port=${SERVER_PORT:4040}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/crw?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

aws.s3.bucket-name=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_S3_REGION:eu-north-1}
aws.s3.access.key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret.key=${AWS_SECRET_ACCESS_KEY:}
